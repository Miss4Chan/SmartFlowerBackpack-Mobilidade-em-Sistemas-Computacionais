;
; Flower MN-CSE — standalone, no IN-CSE registrar
;
; DO NOT edit cseID, cseName, or cseHost directly.
; start_sim.sh / start_rpi.sh patch all three at runtime from
; FLOWER_ID (.env) and the locally detected IP.
;

[basic.config]
cseType             = MN
cseID               = id-mn-flower-1
cseName             = cse-mn-flower-1
serviceProviderID   = //acme.example.com
adminID             = CAdmin
networkInterface    = 0.0.0.0
cseHost             = 0.0.0.0
httpPort            = 8081
databaseType        = tinydb
logLevel            = error
consoleTheme        = dark


[textui]
startWithTUI = false

[cse.operation.requests]
enable = true

[http]
enableUpperTesterEndpoint = true
enableStructureEndpoint   = true
enableManagementEndpoint  = true

[cse.operation.plugins]
_/remoteCSEManager_enable\_ = false
_/announcementManager_enable\_ = false
