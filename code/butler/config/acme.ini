;
; Butler MN-CSE — standalone, no IN-CSE registrar
;
; DO NOT edit cseHost directly — scripts/start.sh patches it at runtime
; from the locally detected LAN IP. The 0.0.0.0 below is a placeholder only.
;
;

[basic.config]
cseType             = MN
cseID               = id-mn-butler
cseName             = cse-mn-butler
serviceProviderID   = //acme.example.com
adminID             = CAdmin
networkInterface    = 0.0.0.0
cseHost             = 0.0.0.0
httpPort            = 8082
databaseType        = tinydb
logLevel            = error
consoleTheme        = dark


[textui]
startWithTUI = false

[cse.operation.requests]
enable = false

[http]
enableUpperTesterEndpoint = true
enableStructureEndpoint   = true
enableManagementEndpoint  = true

[mqtt]
enable = false

[cse.operation.plugins]
_/remoteCSEManager_enable\_ = false
_/announcementManager_enable\_ = false
